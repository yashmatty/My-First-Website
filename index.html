<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Facts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            color: white;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            animation: fadeInUp 0.8s ease-out;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .card {
            height: 250px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-content {
            text-align: center;
            z-index: 2;
            opacity: 1;
            transform: scale(1);
            transition: all 0.4s ease;
        }

        .card:hover .card-content {
            opacity: 1;
            transform: scale(1);
        }

        .card-number {
            font-size: 3rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
            transition: color 0.4s ease;
        }

        .card:hover .card-number {
            color: white;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            transition: color 0.4s ease;
        }

        .card:hover .card-title {
            color: white;
        }

        .card-preview {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.5;
            transition: all 0.4s ease;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card:hover .card-preview {
            color: rgba(255, 255, 255, 0.9);
            -webkit-line-clamp: unset;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            font-weight: 300;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
            border: none;
            background: none;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #667eea;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-number {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 2rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .modal-body {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card {
                height: 200px;
            }

            .modal-content {
                padding: 40px 25px;
            }

            .modal-title {
                font-size: 1.5rem;
            }

            .modal-body {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FUN FACTS</h1>
        <p>Hover over any card to discover something amazing</p>
    </div>

    <div class="container">
        <div class="grid" id="grid">
            <!-- Cards will be generated here -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <div class="modal-number" id="modalNumber"></div>
                <h2 class="modal-title" id="modalTitle"></h2>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const facts = [
            {
                title: "Octopuses Have Blue Blood",
                preview: "Their blood is blue due to a copper-based molecule...",
                fullText: "Octopuses have blue blood because they use a copper-based molecule called hemocyanin to carry oxygen, rather than the iron-based hemoglobin that humans use. This adaptation helps them survive in cold, low-oxygen deep-sea environments where they live."
            },
            {
                title: "Honey Never Spoils",
                preview: "Archaeologists have found 3000-year-old honey...",
                fullText: "Honey has been found in ancient Egyptian tombs that is over 3,000 years old and still perfectly edible. This is because honey has a low moisture content and high acidity, creating an environment where bacteria cannot survive."
            },
            {
                title: "Bananas Are Berries",
                preview: "But strawberries technically aren't...",
                fullText: "Bananas are botanically classified as berries, while strawberries are not. A true berry develops from a single flower's ovary and has seeds embedded in the flesh. Bananas fit this definition perfectly!"
            },
            {
                title: "Tardigrades Survive Space",
                preview: "These microscopic creatures can survive...",
                fullText: "Tardigrades, also known as water bears, are nearly indestructible. They can survive extreme temperatures, radiation, dehydration, and even the vacuum of space. Scientists have sent them to space and they survived the harsh conditions."
            },
            {
                title: "Neurons Keep Growing",
                preview: "Your brain continues to create new neurons...",
                fullText: "Contrary to old beliefs, your brain produces new neurons throughout your lifetime in a process called neurogenesis. This happens primarily in the hippocampus, a region associated with memory and learning."
            },
            {
                title: "Fingerprints Are Unique",
                preview: "Even identical twins have different fingerprints...",
                fullText: "Every human fingerprint is unique, including those of identical twins. These patterns form randomly during fetal development and remain unchanged throughout your life, making them perfect for identification."
            },
            {
                title: "Cats Have 32 Muscles",
                preview: "Each ear has 32 muscles for movement...",
                fullText: "A cat's ears contain 32 muscles each, allowing them to rotate independently up to 180 degrees. This incredible mobility helps them locate sounds and communicate their moods to other cats."
            },
            {
                title: "Venus Rotates Backwards",
                preview: "It's one of only two planets that does...",
                fullText: "Venus rotates clockwise when viewed from above the North Pole, opposite to most planets including Earth. Scientists believe a massive collision early in its history may have caused this unusual retrograde rotation."
            },
            {
                title: "Smell Triggers Memory",
                preview: "Olfactory memories are processed directly...",
                fullText: "The olfactory bulb, which processes smell, is directly connected to the limbic system—the part of the brain associated with emotion and memory. This is why a single scent can instantly transport you to a specific moment in time."
            }
        ];

        // Generate grid
        function generateGrid() {
            const grid = document.getElementById('grid');
            facts.forEach((fact, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-number">${index + 1}</div>
                        <h3 class="card-title">${fact.title}</h3>
                        <p class="card-preview">${fact.preview}</p>
                    </div>
                `;
                card.addEventListener('click', () => openModal(index));
                grid.appendChild(card);
            });
        }

        // Modal functions
        function openModal(index) {
            const fact = facts[index];
            document.getElementById('modalNumber').textContent = index + 1;
            document.getElementById('modalTitle').textContent = fact.title;
            document.getElementById('modalBody').textContent = fact.fullText;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        generateGrid();
    </script>
</body>
</html>
