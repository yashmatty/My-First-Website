<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Fun Facts Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #230007 0%, #230007 50%, #E8E9F3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #F93943;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0.2;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
            z-index: 1;
            position: relative;
        }

        .header h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #F93943 0%, #FCECC9 50%, #230007 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(249, 57, 67, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .header p {
            color: #230007;
            font-size: 1.3rem;
            font-weight: 700;
            background: #FCECC9;
            padding: 12px 24px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(249, 57, 67, 0.2);
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .score-board {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #FCECC9;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            color: #230007;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-size: 1.1rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            animation: fadeInUp 0.8s ease-out;
            z-index: 1;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }

        .card {
            height: 280px;
            background: linear-gradient(135deg, #FCECC9 0%, #E8E9F3 100%);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(249, 57, 67, 0.15);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transform-style: preserve-3d;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #F93943 0%, #230007 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: -1;
            border-radius: 20px;
        }

        .card::after {
            content: '🎯';
            position: absolute;
            font-size: 60px;
            top: -50px;
            right: -50px;
            opacity: 0;
            transform: rotate(-45deg) scale(0);
            transition: all 0.5s ease;
        }

        .card:hover {
            transform: translateY(-20px) scale(1.05) rotateY(5deg);
            box-shadow: 0 30px 70px rgba(249, 57, 67, 0.35);
            border-color: #F93943;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover::after {
            opacity: 1;
            top: 10px;
            right: 10px;
            transform: rotate(0deg) scale(1);
        }

        .card-content {
            text-align: center;
            z-index: 2;
            opacity: 1;
            transform: scale(1);
            transition: all 0.5s ease;
        }

        .card:hover .card-content {
            opacity: 1;
            transform: scale(1);
        }

        .card-number {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #F93943 0%, #230007 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            transition: all 0.5s ease;
        }

        .card:hover .card-number {
            color: #FCECC9;
            transform: scale(1.2) rotate(360deg);
            -webkit-text-fill-color: unset;
            background: unset;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #230007;
            margin-bottom: 12px;
            transition: all 0.5s ease;
        }

        .card:hover .card-title {
            color: #FCECC9;
            transform: scale(1.1);
        }

        .card-preview {
            font-size: 0.95rem;
            color: #230007;
            line-height: 1.6;
            transition: all 0.5s ease;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 600;
        }

        .card:hover .card-preview {
            color: #FCECC9;
            -webkit-line-clamp: unset;
            line-clamp: unset;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(35, 0, 7, 0.8);
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(6px);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #FCECC9 0%, #E8E9F3 100%);
            padding: 60px;
            border-radius: 30px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(249, 57, 67, 0.4);
            animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            border: 4px solid #F93943;
        }

        .modal-content::before {
            content: '⭐';
            position: absolute;
            font-size: 40px;
            top: -20px;
            left: -20px;
            animation: spin 2s linear infinite;
        }

        .modal-content::after {
            content: '⭐';
            position: absolute;
            font-size: 40px;
            bottom: -20px;
            right: -20px;
            animation: spin 2s linear infinite reverse;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5rem;
            font-weight: 700;
            color: #F93943;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: none;
            padding: 0;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(232, 233, 243, 0.5);
        }

        .close-btn:hover {
            color: white;
            background: #F93943;
            transform: scale(1.1) rotate(90deg);
        }

        .modal-header {
            margin-bottom: 25px;
        }

        .modal-number {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #F93943 0%, #230007 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            animation: bounce 1s ease-in-out;
        }

        .modal-title {
            font-size: 2.2rem;
            color: #230007;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .modal-body {
            font-size: 1.15rem;
            color: #230007;
            line-height: 2;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .header p {
                font-size: 1.1rem;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card {
                height: 240px;
            }

            .modal-content {
                padding: 40px 25px;
            }

            .modal-title {
                font-size: 1.7rem;
            }

            .modal-body {
                font-size: 1rem;
            }

            .score-board {
                top: 10px;
                right: 10px;
                font-size: 0.9rem;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="score-board">
        📊 Facts Discovered: <span id="factCount">0</span>/9
    </div>

    <div class="header">
        <h1>🎮 FUN FACTS QUEST</h1>
        <p>🎯 Click cards to unlock amazing discoveries!</p>
    </div>

    <div class="container">
        <div class="grid" id="grid">
            <!-- Cards will be generated here -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <div class="modal-number" id="modalNumber"></div>
                <h2 class="modal-title" id="modalTitle"></h2>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const facts = [
            {
                title: "Octopuses Have Blue Blood",
                preview: "Their blood is blue due to a copper-based molecule...",
                fullText: "Octopuses have blue blood because they use a copper-based molecule called hemocyanin to carry oxygen, rather than the iron-based hemoglobin that humans use. This adaptation helps them survive in cold, low-oxygen deep-sea environments where they live."
            },
            {
                title: "Honey Never Spoils",
                preview: "Archaeologists have found 3000-year-old honey...",
                fullText: "Honey has been found in ancient Egyptian tombs that is over 3,000 years old and still perfectly edible. This is because honey has a low moisture content and high acidity, creating an environment where bacteria cannot survive."
            },
            {
                title: "Bananas Are Berries",
                preview: "But strawberries technically aren't...",
                fullText: "Bananas are botanically classified as berries, while strawberries are not. A true berry develops from a single flower's ovary and has seeds embedded in the flesh. Bananas fit this definition perfectly!"
            },
            {
                title: "Tardigrades Survive Space",
                preview: "These microscopic creatures can survive...",
                fullText: "Tardigrades, also known as water bears, are nearly indestructible. They can survive extreme temperatures, radiation, dehydration, and even the vacuum of space. Scientists have sent them to space and they survived the harsh conditions."
            },
            {
                title: "Neurons Keep Growing",
                preview: "Your brain continues to create new neurons...",
                fullText: "Contrary to old beliefs, your brain produces new neurons throughout your lifetime in a process called neurogenesis. This happens primarily in the hippocampus, a region associated with memory and learning."
            },
            {
                title: "Fingerprints Are Unique",
                preview: "Even identical twins have different fingerprints...",
                fullText: "Every human fingerprint is unique, including those of identical twins. These patterns form randomly during fetal development and remain unchanged throughout your life, making them perfect for identification."
            },
            {
                title: "Cats Have 32 Muscles",
                preview: "Each ear has 32 muscles for movement...",
                fullText: "A cat's ears contain 32 muscles each, allowing them to rotate independently up to 180 degrees. This incredible mobility helps them locate sounds and communicate their moods to other cats."
            },
            {
                title: "Venus Rotates Backwards",
                preview: "It's one of only two planets that does...",
                fullText: "Venus rotates clockwise when viewed from above the North Pole, opposite to most planets including Earth. Scientists believe a massive collision early in its history may have caused this unusual retrograde rotation."
            },
            {
                title: "Smell Triggers Memory",
                preview: "Olfactory memories are processed directly...",
                fullText: "The olfactory bulb, which processes smell, is directly connected to the limbic system—the part of the brain associated with emotion and memory. This is why a single scent can instantly transport you to a specific moment in time."
            }
        ];

        let discoveredFacts = new Set();

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Generate grid
        function generateGrid() {
            const grid = document.getElementById('grid');
            facts.forEach((fact, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-number">${index + 1}</div>
                        <h3 class="card-title">${fact.title}</h3>
                        <p class="card-preview">${fact.preview}</p>
                    </div>
                `;
                card.addEventListener('click', () => openModal(index));
                grid.appendChild(card);
            });
        }

        // Modal functions
        function openModal(index) {
            discoveredFacts.add(index);
            updateScore();
            const fact = facts[index];
            document.getElementById('modalNumber').textContent = index + 1;
            document.getElementById('modalTitle').textContent = fact.title;
            document.getElementById('modalBody').textContent = fact.fullText;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            playSound();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateScore() {
            document.getElementById('factCount').textContent = discoveredFacts.size;
        }

        function playSound() {
            // Create a simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        createParticles();
        generateGrid();
    </script>
</body>
</html>
